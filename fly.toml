# Fly.io config for the Fantasy PL custom server (Next + Socket.io).
# NOTE: run a SINGLE machine — draft timers/state live in process memory
# (src/server/socket-server.ts), so horizontal scaling would break live drafts.

app = "fantasy-pl"          # change to your Fly app name
primary_region = "lhr"      # London; pick the region nearest your testers

[build]
  dockerfile = "Dockerfile"
  # Pass the public URL at deploy time so NEXT_PUBLIC_SOCKET_URL is baked in:
  #   fly deploy --build-arg NEXT_PUBLIC_SOCKET_URL=https://<app>.fly.dev

[deploy]
  # Apply pending migrations against the production DB before the new release goes live.
  release_command = "npx prisma migrate deploy"

[env]
  PORT = "3000"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  # Keep one machine always running so the in-memory draft state survives.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    method = "GET"
    path = "/api/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
